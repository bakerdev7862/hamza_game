<svg viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ballGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb168"/>
      <stop offset="0.55" stop-color="#ff8a3d"/>
      <stop offset="1" stop-color="#d9540f"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd23f"/>
      <stop offset="1" stop-color="#ff6b35"/>
    </linearGradient>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1b1147" flood-opacity="0.55"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <g transform="translate(72,75)">
      <circle r="62" fill="url(#ballGrad)" stroke="#2b1707" stroke-width="5"/>
      <path d="M -62 0 H 62" stroke="#2b1707" stroke-width="5" fill="none"/>
      <path d="M 0 -62 V 62" stroke="#2b1707" stroke-width="5" fill="none"/>
      <path d="M -62 0 C -30 -42 30 -42 62 0" stroke="#2b1707" stroke-width="5" fill="none"/>
      <path d="M -62 0 C -30 42 30 42 62 0" stroke="#2b1707" stroke-width="5" fill="none"/>
      <circle r="62" fill="none" stroke="#2b1707" stroke-width="5"/>
    </g>

    <text x="158" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="900"
          fill="url(#textGrad)" letter-spacing="3">SUPER</text>
    <text x="158" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="40" font-weight="900"
          fill="#ffffff" letter-spacing="2">BASKETBALL</text>
  </g>
</svg>
