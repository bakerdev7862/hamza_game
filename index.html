<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Basketball</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header id="topbar">
  <img id="topbar-logo" src="assets/favicon.svg" alt="">
  <span id="topbar-title">Super Basketball</span>
</header>
<div id="game-container">
  <canvas id="game-canvas" width="1000" height="500"></canvas>
  <div id="hud">
    <div id="instructions">&larr; &rarr; Move &nbsp;|&nbsp; Hold SPACE to charge shot, release to throw</div>
    <div id="score-panel">
      <div class="score" id="score">0</div>
      <div class="stats" id="stats">0 / 0 shots</div>
    </div>
    <div id="feedback"></div>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
